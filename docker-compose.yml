version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: yhct-clinic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yhct-clinic-db
      # Optional: Set timezone
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      # Persist data thậm chí khi container được xóa
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yhct-network

volumes:
  postgres_data:
    driver: local

networks:
  yhct-network:
    driver: bridge
